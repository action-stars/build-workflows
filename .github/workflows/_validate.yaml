name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  workflow:
    name: Workflow
    uses: action-stars/generic-workflows/.github/workflows/validate-gh-workflows.yaml@9ebbb6e9360565432fd1898fda091048be02db1b # v0.12.0
    with:
      auto_doc: true
      shellcheck: true
      yamlfmt: true
      rumdl: true
